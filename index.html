<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#69147b">
  <link rel="manifest" href="manifest.json">
  <title>TOP 10 — Produit Mystère</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, sans-serif;
      background: #faf5fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ===== DECOS DE FOND ===== */
    .deco, .star-deco { position: fixed; pointer-events: none; z-index: 0; }
    .deco { border-radius: 50%; }
    .star-deco { line-height: 1; user-select: none; }
    @keyframes floatUp   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-30px)} }
    @keyframes floatDown { 0%,100%{transform:translateY(0)} 50%{transform:translateY(28px)} }
    @keyframes drift     { 0%,100%{transform:translate(0,0) rotate(0deg)} 33%{transform:translate(18px,-15px) rotate(12deg)} 66%{transform:translate(-12px,10px) rotate(-8deg)} }
    @keyframes spin      { from{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(1.5)} to{transform:rotate(360deg) scale(1)} }

    /* ===== CARTE ===== */
    .card {
      position: relative; z-index: 1;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 48px rgba(105,20,123,0.13);
      width: min(720px, 94vw);
      padding: 28px 34px 26px;
      border: 1.5px solid rgba(105,20,123,0.10);
    }
    .logo-img { height: 48px; object-fit: contain; display: block; margin-bottom: 18px; }
    .header { text-align: center; margin-bottom: 22px; }
    .header-title { font-size: clamp(26px,4vw,36px); font-weight: 900; letter-spacing: -0.5px; }
    .t1 { background: linear-gradient(90deg,#f59e0b,#ec4899,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .t2 { color: #69147b; -webkit-text-fill-color: #69147b; }
    .header-sub { font-size: 14px; color: #7c4d8a; margin-top: 6px; }

    /* ===== PODIUM ===== */
    .podium { display: flex; gap: 12px; margin-bottom: 22px; align-items: flex-end; }
    .pod { flex:1; border-radius:16px; padding:16px 10px 13px; text-align:center; position:relative; overflow:hidden; }
    .pod.gold   { background:linear-gradient(150deg,#fffbeb,#fde68a); border:2px solid #f59e0b; flex:1.12; padding-top:20px; box-shadow:0 4px 24px rgba(245,158,11,.25); animation: podGoldPulse 2.5s ease-in-out infinite; }
    .pod.silver { background:linear-gradient(150deg,#f8fafc,#e2e8f0); border:2px solid #94a3b8; }
    .pod.bronze { background:linear-gradient(150deg,#fff7ed,#fed7aa); border:2px solid #f97316; animation: podBronzeWiggle 3s ease-in-out infinite; }

    /* Pulsation dorée sur le 1er */
    @keyframes podGoldPulse {
      0%,100% { box-shadow: 0 4px 24px rgba(245,158,11,.25); transform: scale(1); }
      50%      { box-shadow: 0 6px 36px rgba(245,158,11,.55), 0 0 0 6px rgba(245,158,11,.10); transform: scale(1.02); }
    }
    /* Shimmer sur le 2e */
    .pod.silver::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer { 0%{left:-100%} 50%,100%{left:150%} }
    /* Petite vibration bronze */
    @keyframes podBronzeWiggle {
      0%,90%,100% { transform: rotate(0deg); }
      92%          { transform: rotate(-1.5deg); }
      94%          { transform: rotate(1.5deg); }
      96%          { transform: rotate(-1deg); }
      98%          { transform: rotate(1deg); }
    }

    /* Entrée en scène au chargement */
    @keyframes podEnter {
      from { opacity:0; transform: translateY(40px) scale(0.9); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }
    .pod-enter { animation: podEnter 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }

    .pod-medal { font-size:clamp(28px,4.5vw,42px); display:block; margin-bottom:7px; }
    .pod-name  { font-size:clamp(14px,2vw,17px); font-weight:800; color:#1a0820; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pod-time  { font-size:clamp(20px,3vw,28px); font-weight:900; color:#69147b; margin-top:4px; }
    .pod-time .u { font-size:0.55em; color:#7c4d8a; font-weight:500; }

    /* ===== LISTE ===== */
    .rank-list { display:flex; flex-direction:column; gap:8px; }
    .rank-row {
      display:flex; align-items:center; gap:13px;
      padding:11px 16px; border-radius:12px;
      background:#f5e6f8; border:1px solid rgba(105,20,123,0.10);
      animation: slideIn 0.4s ease both;
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
    .rn    { font-size:14px; font-weight:800; color:#69147b; min-width:28px; text-align:center; background:rgba(105,20,123,0.12); border-radius:7px; padding:3px 7px; }
    .rname { flex:1; font-size:clamp(14px,2vw,17px); font-weight:700; color:#1a0820; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .rbar-wrap { width:70px; height:5px; background:rgba(105,20,123,0.12); border-radius:3px; overflow:hidden; }
    .rbar  { height:100%; border-radius:3px; background:linear-gradient(90deg,#69147b,#8b1fa0); transition:width 0.8s ease; }
    .rtime { font-size:clamp(14px,2vw,17px); font-weight:800; color:#69147b; min-width:65px; text-align:right; }
    .rtime .u { font-size:0.7em; color:#7c4d8a; font-weight:500; }

    .empty  { text-align:center; padding:28px; color:#7c4d8a; font-size:15px; }
    .footer { margin-top:14px; text-align:center; font-size:11px; color:#7c4d8a; opacity:0.6; }
    .err    { padding:13px; color:#dc2626; font-size:13px; background:#fef2f2; border-radius:9px; text-align:center; }

    /* ===== FLASH FOND (Top 10) ===== */
    #bg-flash {
      position: fixed; inset: 0; z-index: 50;
      pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(105,20,123,0.35) 0%, transparent 70%);
      opacity: 0;
    }
    @keyframes bgFlash {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      100% { opacity: 0; }
    }
    #bg-flash.active { animation: bgFlash 2s ease forwards; }

    /* ===== OVERLAY TOP 3 ===== */
    #top3-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
      opacity: 0;
    }
    #top3-overlay.active { animation: overlayAnim 3s ease forwards; }
    @keyframes overlayAnim {
      0%   { opacity:0; }
      10%  { opacity:1; }
      75%  { opacity:1; }
      100% { opacity:0; }
    }
    #top3-text {
      font-family: Inter, sans-serif;
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 40px rgba(245,158,11,1), 0 4px 20px rgba(0,0,0,0.4);
      letter-spacing: -1px;
      text-align: center;
      background: linear-gradient(135deg, #f59e0b, #ec4899, #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: textPop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
    }
    @keyframes textPop {
      from { transform: scale(0.5); opacity:0; }
      to   { transform: scale(1);   opacity:1; }
    }
    #top3-sub {
      font-size: clamp(16px,2.5vw,24px);
      color: #69147b;
      font-weight: 700;
      margin-top: 10px;
      animation: textPop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
    }

    /* ===== CONFETTIS ===== */
    #confetti-layer {
      position: fixed; inset: 0; z-index: 90;
      pointer-events: none; overflow: hidden;
    }
    .cfetti {
      position: absolute;
      border-radius: 3px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
    }

    /* ===== ECLAIR (Top 3) ===== */
    #lightning {
      position: fixed; inset: 0; z-index: 95;
      pointer-events: none; opacity: 0;
      background: rgba(255,255,255,0.85);
    }
    @keyframes lightningFlash {
      0%,100% { opacity:0; }
      5%       { opacity:0.9; }
      10%      { opacity:0; }
      15%      { opacity:0.7; }
      20%      { opacity:0; }
    }
    #lightning.active { animation: lightningFlash 0.6s ease forwards; }

    /* ===== PARTICULES TOP3 ===== */
    .spark {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 92;
      animation: sparkFly ease-out forwards;
    }
    @keyframes sparkFly {
      0%   { transform: translate(0,0) scale(1); opacity:1; }
      100% { opacity:0; }
    }
  </style>
</head>

<div id="top3-overlay">
  <div id="top3-text">🏆 NOUVEAU TOP 3 !</div>
  <div id="top3-sub" id="top3-sub"></div>
</div>

<script>
/* ===== DECOS DE FOND ===== */
(function(){
  var colors=['#69147b','#8b1fa0','#f59e0b','#f97316','#ec4899','#06b6d4','#c084fc','#3b82f6','#10b981','#f43f5e','#a855f7','#fbbf24'];
  var anims=['floatUp','floatDown','drift'];
  var stars=['★','✦','✧','◆','✶','✸','❋','✺'];
  function rnd(a,b){return a+Math.random()*(b-a);}
  function pick(a){return a[Math.floor(Math.random()*a.length)];}
  var card=document.querySelector('.card');
  for(var i=0;i<22;i++){
    var el=document.createElement('div'); el.className='deco';
    var sz=rnd(14,46),c=colors[i%colors.length],isRing=(i%4===0);
    el.style.width=sz+'px'; el.style.height=sz+'px';
    if(isRing){el.style.border='4px solid '+c; el.style.background='transparent';}
    else el.style.background=c;
    el.style.opacity=rnd(0.55,0.80).toFixed(2);
    el.style.left=rnd(0,95).toFixed(1)+'%'; el.style.top=rnd(0,95).toFixed(1)+'%';
    el.style.animation=pick(anims)+' '+rnd(4,9).toFixed(1)+'s ease-in-out '+rnd(0,6).toFixed(1)+'s infinite';
    document.body.insertBefore(el,card);
  }
  for(var j=0;j<22;j++){
    var s=document.createElement('div'); s.className='star-deco';
    s.textContent=pick(stars);
    s.style.fontSize=rnd(20,38).toFixed(0)+'px'; s.style.color=colors[(j+3)%colors.length];
    s.style.opacity=rnd(0.65,0.90).toFixed(2);
    s.style.left=rnd(0,95).toFixed(1)+'%'; s.style.top=rnd(0,95).toFixed(1)+'%';
    s.style.animation='spin '+rnd(3,7).toFixed(1)+'s linear '+rnd(0,5).toFixed(1)+'s infinite';
    document.body.insertBefore(s,card);
  }
})();

/* ===== FULLSCREEN au tap ===== */
document.addEventListener('click',function(){
  var el=document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
});

/* ===== CONFETTIS ===== */
function launchConfetti(count, duration){
  var layer=document.getElementById('confetti-layer');
  var colors=['#f59e0b','#ec4899','#7c3aed','#06b6d4','#10b981','#f97316','#69147b','#fbbf24','#a855f7','#f43f5e'];
  for(var i=0;i<count;i++){
    (function(i){
      setTimeout(function(){
        var c=document.createElement('div'); c.className='cfetti';
        var sz=(6+Math.random()*10).toFixed(0);
        c.style.width=sz+'px'; c.style.height=sz+'px';
        c.style.background=colors[Math.floor(Math.random()*colors.length)];
        c.style.left=(Math.random()*100).toFixed(1)+'%';
        c.style.top='-20px';
        c.style.animationDuration=(1.5+Math.random()*2).toFixed(2)+'s';
        layer.appendChild(c);
        setTimeout(function(){ if(c.parentNode) c.parentNode.removeChild(c); }, 4000);
      }, i * (duration/count));
    })(i);
  }
}

/* ===== PARTICULES TOP3 ===== */
function launchSparks(){
  var colors=['#f59e0b','#fde68a','#ec4899','#fff','#7c3aed','#fbbf24'];
  var cx=window.innerWidth/2, cy=window.innerHeight/2;
  for(var i=0;i<40;i++){
    (function(i){
      setTimeout(function(){
        var s=document.createElement('div'); s.className='spark';
        var sz=(8+Math.random()*16).toFixed(0);
        s.style.width=sz+'px'; s.style.height=sz+'px';
        s.style.background=colors[Math.floor(Math.random()*colors.length)];
        s.style.left=cx+'px'; s.style.top=cy+'px';
        var angle=Math.random()*Math.PI*2;
        var dist=100+Math.random()*250;
        var tx=(Math.cos(angle)*dist).toFixed(0);
        var ty=(Math.sin(angle)*dist).toFixed(0);
        s.style.setProperty('--tx', tx+'px');
        s.style.setProperty('--ty', ty+'px');
        s.style.animationDuration=(0.6+Math.random()*0.8).toFixed(2)+'s';
        s.style.animationName='sparkCustom'+i;
        var keyframes='@keyframes sparkCustom'+i+'{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate('+tx+'px,'+ty+'px) scale(0);opacity:0}}';
        var style=document.createElement('style'); style.textContent=keyframes;
        document.head.appendChild(style);
        document.body.appendChild(s);
        setTimeout(function(){ if(s.parentNode)s.parentNode.removeChild(s); if(style.parentNode)style.parentNode.removeChild(style); },2000);
      }, i*30);
    })(i);
  }
}

/* ===== ANIMATION TOP 10 ===== */
function animateTop10(name){
  /* Flash fond violet */
  var bf=document.getElementById('bg-flash');
  bf.classList.remove('active');
  void bf.offsetWidth;
  bf.classList.add('active');
  setTimeout(function(){bf.classList.remove('active');},2100);
  /* Confettis modérés */
  launchConfetti(60, 800);
}

/* ===== ANIMATION TOP 3 ===== */
function animateTop3(name, rank){
  /* Eclair */
  var lt=document.getElementById('lightning');
  lt.classList.remove('active'); void lt.offsetWidth; lt.classList.add('active');
  setTimeout(function(){lt.classList.remove('active');},700);
  /* Particules */
  launchSparks();
  /* Confettis massifs */
  launchConfetti(150, 600);
  /* Overlay texte */
  var medals=['🥇','🥈','🥉'];
  var labels=['NOUVEAU LEADER !','NOUVEAU TOP 2 !','NOUVEAU TOP 3 !'];
  document.getElementById('top3-text').textContent = medals[rank-1]+' '+labels[rank-1];
  document.getElementById('top3-sub').textContent  = name + ' entre dans le podium !';
  var ov=document.getElementById('top3-overlay');
  ov.classList.remove('active'); void ov.offsetWidth; ov.classList.add('active');
  setTimeout(function(){ov.classList.remove('active');},3100);
  /* Flash fond violet aussi */
  var bf=document.getElementById('bg-flash');
  bf.classList.remove('active'); void bf.offsetWidth; bf.classList.add('active');
  setTimeout(function(){bf.classList.remove('active');},2100);
}

/* ===== AIRTABLE ===== */
var TOKEN  = 'patDTaxHZP91H2K6n.65e6718d3218317c0a760b78103346297df8f23ba3c59ef819548a36277cdfe3';
var BASE   = 'appmdk45ZwiDUh7jk';
var TABLE  = 'tblMyHbGp91mjje9i';
var PRENOM = 'Prénom';
var NOM    = 'Nom';
var TEMPS  = 'Temps';
var prevTop3Ids = [], prevTop10Ids = [];
var hasData = false, isFirst = true;

function fmt(t){return t.toFixed(2).replace('.',',');}
function setPod(id,e){
  var n=document.getElementById(id+'n'),t=document.getElementById(id+'t');
  if(e){n.textContent=(e.p+' '+e.n).trim(); t.innerHTML=fmt(e.t)+'<span class="u"> s</span>';}
  else{n.textContent='—'; t.textContent='—';}
}

async function load(){
  try{
    var url='https://api.airtable.com/v0/'+BASE+'/'+encodeURIComponent(TABLE)
      +'?fields%5B%5D='+encodeURIComponent(PRENOM)
      +'&fields%5B%5D='+encodeURIComponent(NOM)
      +'&fields%5B%5D='+encodeURIComponent(TEMPS)
      +'&sort%5B0%5D%5Bfield%5D='+encodeURIComponent(TEMPS)
      +'&sort%5B0%5D%5Bdirection%5D=asc'
      +'&maxRecords=10';
    var res=await fetch(url,{headers:{'Authorization':'Bearer '+TOKEN}});
    if(!res.ok) throw new Error('HTTP '+res.status);
    var data=await res.json();
    hasData=true;

    var entries=data.records.map(function(r){
      return{id:r.id,p:r.fields[PRENOM]||'',n:r.fields[NOM]||'',t:parseFloat(r.fields[TEMPS])||0};
    });

    /* Détecter nouveaux entrants */
    if(!isFirst){
      var newTop3  = entries.slice(0,3).filter(function(e){return prevTop3Ids.indexOf(e.id)===-1;});
      var newTop10 = entries.slice(3).filter(function(e){return prevTop10Ids.indexOf(e.id)===-1;});

      if(newTop3.length>0){
        var e=newTop3[0];
        var rank=entries.findIndex(function(x){return x.id===e.id;})+1;
        animateTop3((e.p+' '+e.n).trim(), rank);
      } else if(newTop10.length>0){
        animateTop10((newTop10[0].p+' '+newTop10[0].n).trim());
      }
    }
    isFirst=false;

    prevTop3Ids  = entries.slice(0,3).map(function(e){return e.id;});
    prevTop10Ids = entries.slice(3).map(function(e){return e.id;});

    setPod('p1',entries[0]||null);
    setPod('p2',entries[1]||null);
    setPod('p3',entries[2]||null);

    var list=document.getElementById('list');
    list.innerHTML='';
    if(entries.length===0){
      list.innerHTML='<div class="empty">Aucun participant… Soyez le premier ! 🎮</div>';
      document.getElementById('footer').textContent='En attente de participants';
      return;
    }
    var rest=entries.slice(3),best=entries[0].t,worst=entries[entries.length-1].t,range=worst-best||1;
    rest.forEach(function(e,i){
      var pct=Math.max(8,Math.round((1-(e.t-best)/range)*100));
      var row=document.createElement('div'); row.className='rank-row'; row.style.animationDelay=(i*0.06)+'s';
      row.innerHTML='<span class="rn">'+(i+4)+'</span><span class="rname">'+e.p+' '+e.n+'</span><div class="rbar-wrap"><div class="rbar" style="width:'+pct+'%"></div></div><span class="rtime">'+fmt(e.t)+'<span class="u"> s</span></span>';
      list.appendChild(row);
    });

    var now=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('footer').textContent='Mise à jour : '+now+' · Prochain rafraîchissement dans 30 s';
  }catch(err){
    console.error(err);
    if(!hasData) document.getElementById('list').innerHTML='<div class="err">Connexion impossible.<br><small>'+err.message+'</small></div>';
    document.getElementById('footer').textContent='Erreur — nouvelle tentative dans 30 s';
  }
}

load();
setInterval(load,30000);
</script>
</body>
</html>
